<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rara Notes</title>
  <meta
    name="description"
    content="Rara Notes legacy fallback page. The primary implementation now lives in the Next.js app."
  >
  <style>
    :root {
      --bg: #f3efe6;
      --paper: rgba(255, 252, 245, 0.88);
      --ink: #241f1a;
      --muted: #6e6256;
      --line: rgba(57, 43, 30, 0.12);
      --accent: #9b5f3d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(201, 153, 122, 0.14), transparent 28%),
        linear-gradient(180deg, #f8f4eb 0%, var(--bg) 100%);
    }

    main {
      width: min(100%, 760px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--paper);
      padding: 32px;
      box-shadow: 0 24px 60px rgba(74, 55, 35, 0.08);
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Songti SC", serif;
      font-size: clamp(2rem, 6vw, 3.8rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    p {
      margin: 16px 0 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .note {
      margin-top: 22px;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.62);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Legacy Fallback</p>
    <h1>Rara Notes 已迁移到 Next.js 页面入口。</h1>
    <p>
      这个文件只保留为仓库里的轻量静态后备页。当前主要实现、样式和内容展示逻辑已经移动到 `app/` 目录，并继续使用 `notes/index.json` 作为数据源。
    </p>
    <div class="note">
      打开仓库时，请优先使用 Next.js 入口进行开发与预览。
    </div>
  </main>
</body>
</html>
