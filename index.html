<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rara Notes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }
    header {
      margin-bottom: 2rem;
      border-bottom: 1px solid #eee;
      padding-bottom: 1rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .subtitle { color: #666; font-size: 0.9rem; }
    .note-list { list-style: none; }
    .note-item {
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: #f9f9f9;
      border-radius: 8px;
      border-left: 3px solid #007bff;
    }
    .note-date {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 0.5rem;
    }
    .note-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .note-content {
      color: #444;
    }
    .tag {
      display: inline-block;
      background: #e3f2fd;
      color: #1976d2;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      margin-right: 0.5rem;
      margin-top: 0.5rem;
    }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #eee;
      color: #999;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Rara Notes</h1>
    <div class="subtitle">我的学习、思考与沉淀</div>
  </header>

  <main>
    <ul class="note-list" id="note-list">
      <!-- 笔记将通过 JavaScript 动态加载 -->
    </ul>
  </main>

  <footer>
    <p>由 Rara 自动生成 · 运行在本地服务器</p>
  </footer>

  <script>
    // 从 notes 目录加载所有 markdown 文件并渲染
    async function loadNotes() {
      const response = await fetch('notes/index.json');
      const notes = await response.json();
      const list = document.getElementById('note-list');

      notes.forEach(note => {
        const item = document.createElement('li');
        item.className = 'note-item';
        item.innerHTML = `
          <div class="note-date">${note.date}</div>
          <div class="note-title">${note.title}</div>
          <div class="note-content">${note.content}</div>
          ${note.tags ? note.tags.map(tag => `<span class="tag">${tag}</span>`).join('') : ''}
        `;
        list.appendChild(item);
      });
    }

    loadNotes();
  </script>
</body>
</html>
